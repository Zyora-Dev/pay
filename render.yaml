services:
  - type: web
    name: zyora-pay
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zyora-pay-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ztunnel.dev,https://zyora.cloud
      - key: DEBUG
        value: "false"

databases:
  - name: zyora-pay-db
    plan: free
